<h2><TMPL_VAR DONATE.HEADING></h2>
<TMPL_VAR DONATE.TEXT1>
<TMPL_VAR DONATE.TEXT2>
<TMPL_VAR DONATE.TEXT3>
<TMPL_VAR DONATE.TEXT4>
<TMPL_VAR DONATE.TEXT5>

<div style="display:flex;align-items:center;gap:var(--lb-space-xl);flex-wrap:wrap;margin:var(--lb-space-lg) 0">
	<div>
		<a href="<TMPL_VAR DONATE.LINK_URL1>" target="_blank" class="lb-btn lb-btn-primary lb-btn-icon">
			<i class="pi pi-heart"></i> <TMPL_VAR DONATE.LINK_TEXT1>
		</a>
	</div>
	<div style="font-size:var(--lb-font-sm);color:var(--lb-text-secondary)">
		<TMPL_VAR DONATE.DONATIONS><br>
		<span style="font-size:3em;font-weight:700;color:var(--lb-primary)" id="counter"></span>
	</div>
</div>

<div style="margin:var(--lb-space-lg) 0">
	<p style="margin-bottom:var(--lb-space-sm)"><TMPL_VAR DONATE.DONATE2></p>
	<div style="display:flex;flex-wrap:wrap;gap:var(--lb-space-sm)">
		<a href="<TMPL_VAR DONATE.LINK_URL2>" target="_blank" class="lb-btn lb-btn-sm"><TMPL_VAR DONATE.LINK_TEXT2></a>
		<a href="<TMPL_VAR DONATE.LINK_URL3>" target="_blank" class="lb-btn lb-btn-sm"><TMPL_VAR DONATE.LINK_TEXT3></a>
		<a href="<TMPL_VAR DONATE.LINK_URL4>" target="_blank" class="lb-btn lb-btn-sm"><TMPL_VAR DONATE.LINK_TEXT4></a>
		<a href="<TMPL_VAR DONATE.LINK_URL5>" target="_blank" class="lb-btn lb-btn-sm"><TMPL_VAR DONATE.LINK_TEXT5></a>
		<a href="<TMPL_VAR DONATE.LINK_URL6>" target="_blank" class="lb-btn lb-btn-sm"><TMPL_VAR DONATE.LINK_TEXT6></a>
		<a href="<TMPL_VAR DONATE.LINK_URL7>" target="_blank" class="lb-btn lb-btn-sm"><TMPL_VAR DONATE.LINK_TEXT7></a>
	</div>
</div>

<div style="margin-top:var(--lb-space-xl)">
	<p><b><TMPL_VAR DONATE.DONORS></b></p>
</div>

<style>
.donator_table {
	width: 100%;
	max-width: 700px;
	background: var(--lb-card-bg);
	border-collapse: collapse;
}
.donator_table tr {
	height: 30px;
}
.donator_table td {
	padding: 4px 10px;
	color: var(--lb-text);
}
.donator_table tr:nth-child(even) {
	background: var(--lb-sidebar-active-bg);
}
</style>

<table class="donator_table">
<TMPL_LOOP NAME="DONORLIST">
	<tr>
		<td style="width:110px;"><TMPL_VAR NAME="DATE"></td>
		<td style="width:200px;"><b><TMPL_VAR NAME="NAME"></b></td>
		<td style="font-size:80%;"><i><TMPL_VAR NAME="COMMENT"></i></td>
	</tr>
</TMPL_LOOP>
</table>

<script>
var i = 0;
var inv = setInterval(function() {
	if (i < <TMPL_VAR NAME="COUNTER">)
		document.getElementById("counter").innerHTML = ++i;
	else
		clearInterval(inv);
}, 30);
</script>
<!-- ** END template/system/donate.html ************************************************************************************ -->
