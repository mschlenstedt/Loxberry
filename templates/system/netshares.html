<style>
.datahidden {
	display:none;
}

	font-size:70%;
}

.bitsmall {
	font-size:86%;
}

.grayed {
	color: gray;
}

.center {
	text-align: center;
}

.mono {
	font-family: 'Courier New', monospace;
	font-size: 85%;
}

.flexbox {
	padding: 6px;
}

.flexbreak {
  flex-basis: 100%;
  height: 0;
  border-top:1px solid gray;

<TMPL_IF FORM>

	<center>
	<form method="post" data-ajax="false" name="main_form" id="main_form" action="/admin/system/netshares.cgi">
		<input type="hidden" name="a" id="a" value="del">
		<input type="hidden" name="server" id="server">

	<h3 class="lbtitle"><TMPL_VAR NETSHARES.HEADING_CONF_SERVERS></h3>
	<div id="serverlist_container" style="display:flex;flex-wrap:wrap;align-items:center;">
	<div class="flexbreak"></div>
	<TMPL_LOOP NETSERVERS>
		<div class="flexbox" style="flex-basis:25%">
			<b><TMPL_VAR NETSERVER_SERVER></b>
		</div>
		<div class="flexbox" style="flex-basis:5%">
			<TMPL_VAR NETSERVER_TYPE>
		</div>
		<div class="flexbox" style="flex-basis:20%">
			<TMPL_VAR NETSERVER_USERNAME>
		</div>
		<div class="flexbox" style="flex-basis:10%">
			*****
		</div>
		<div class="flexbox" style="flex-basis:20%">
			<button type="submit" form="main_form" value="submit" data-server="<TMPL_VAR NETSERVER_SERVER>|<TMPL_VAR NETSERVER_TYPE>" class="lb-btn lb-btn-sm lb-btn-icon deleteserver" data-role="none"><i class="pi pi-minus"></i> <TMPL_VAR NETSHARES.BUTTON_DEL_SERVER></button>
		</div>
		<div class="flexbreak"></div>
	</TMPL_LOOP>
	</div>
	<a class="lb-btn lb-btn-sm lb-btn-icon" id="add" href="/admin/system/netshares.cgi?a=add"><i class="pi pi-plus"></i> <TMPL_VAR NETSHARES.BUTTON_ADD_SERVER></a>

	<a class="lb-btn lb-btn-sm lb-btn-icon" id="debug" href="/admin/system/netshares.cgi?a=debuglog"><i class="pi pi-info-circle"></i> <TMPL_VAR NETSHARES.BUTTON_ADD_DEBUGLOG></a>
		<TMPL_IF DEBUGLOGEXISTS>
	<a class="lb-btn lb-btn-sm lb-btn-icon" id="log" href="/admin/system/tools/logfile.cgi?logfile=system_tmpfs/netshare_debug.log&header=html&format=template&only=once" target='_blank'><i class="pi pi-info-circle"></i> <TMPL_VAR NETSHARES.BUTTON_SHOW_DEBUGLOG></a>
		</TMPL_IF>
	<button class="lb-btn lb-btn-sm lb-btn-icon" type="button" name="btnsubmit" onClick="location.reload();"><i class="pi pi-refresh"></i> <font size=\"-1\"><TMPL_VAR COMMON.BUTTON_REFRESH></font></button>

	</form>
	
	<p></p>
	<h3><TMPL_VAR NETSHARES.HEADING_AVAIL_SHARES></h3>
	</center>
	<!-- START Plugin container -->
	<table class="lb-table lb-table-responsive lb-table-sortable">
		<thead>
		<tr>
			<th><TMPL_VAR NETSHARES.SHARESTABLE_NO></th>
			<th><TMPL_VAR NETSHARES.SHARESTABLE_SERVER></th>
			<th><TMPL_VAR NETSHARES.SHARESTABLE_TYPE></th>
			<th><TMPL_VAR NETSHARES.SHARESTABLE_SHARE></th>
			<th><TMPL_VAR STORAGE.SIZE></th>
			<th><TMPL_VAR STORAGE.USED></th>
			<th><TMPL_VAR STORAGE.AVAILABLE></th>
			<th><TMPL_VAR NETSHARES.SHARESTABLE_STATUS></th>
			<th><TMPL_VAR NETSHARES.SHARESTABLE_ACTION></th>
		</tr>
		</thead>
		<tbody>
		<TMPL_IF NETSHARES>
			<TMPL_LOOP NETSHARES>
			<tr>
				<td data-label="<TMPL_VAR NETSHARES.SHARESTABLE_NO>"><TMPL_VAR NETSHARE_NO></td>
				<td data-label="<TMPL_VAR NETSHARES.SHARESTABLE_SERVER>"><TMPL_VAR NETSHARE_SERVER></td>
				<td data-label="<TMPL_VAR NETSHARES.SHARESTABLE_TYPE>"><TMPL_VAR NETSHARE_TYPE> <TMPL_IF NETSHARE_DIALECT>(<TMPL_VAR NETSHARE_DIALECT>)</TMPL_IF></td>
				<td data-label="<TMPL_VAR NETSHARES.SHARESTABLE_SHARE>"><TMPL_VAR NETSHARE_SHARENAME></td>
				<td data-label="<TMPL_VAR STORAGE.SIZE>"><TMPL_VAR NETSHARE_SIZE_HR></td>
				<td data-label="<TMPL_VAR STORAGE.USED>"><TMPL_VAR NETSHARE_USED_HR></td>
				<td data-label="<TMPL_VAR STORAGE.AVAILABLE>"><TMPL_VAR NETSHARE_AVAILABLE_HR></td>
				<td data-label="<TMPL_VAR NETSHARES.SHARESTABLE_STATUS>"><TMPL_VAR NETSHARE_STATE></td>
				<td data-label="<TMPL_VAR NETSHARES.SHARESTABLE_ACTION>"><a class="lb-btn lb-btn-sm lb-btn-icon" id="browse<TMPL_VAR NETSHARE_NO>" href="/admin/system/tools/filemanager/index.html" target="_self"><i class="pi pi-search"></i> <TMPL_VAR NETSHARES.BUTTON_BROWSE></a>
				</td>
			</tr>
			</TMPL_LOOP>
		<TMPL_ELSE>
			<tr>
				<td colspan="6"><TMPL_VAR NETSHARES.HINT_NOSERVERS></td>
			</tr>
		</TMPL_IF>
		</tbody>
		</table>
<SCRIPT>
$(function() {
	
	$(".deleteserver").click(function( event ) {
		// event.preventDefault();
		var server = $(this).data("server");
		// console.log("Clicked", server, $(this));
		$("#server").val(server);
	});
});

</SCRIPT>

</TMPL_IF>

<TMPL_IF ADD>

<form method="post" data-ajax="false" name="main_form" id="main_form" action="/admin/system/netshares.cgi" style="max-width:80%;">
	<input type="hidden" name="saveformdata" value="1">
	<input type="hidden" name="type" value="smb">

	<div class="lb-form-row">
		<div class="lb-form-label">
			<label for="serverip"><TMPL_VAR NETSHARES.LABEL_SERVERIP></label>
		</div>
		<div class="lb-form-field">
			<input class="lb-input" value="" id='serverip' name='serverip' type='text' data-validation-error-msg="<TMPL_VAR NETSHARES.MSG_VAL_INVALID_IP>" data-validation-rule="special:domainname_or_ipaddr">
		</div>
		<div class="lb-form-help hint"><TMPL_VAR NETSHARES.HINT_SERVERIP></div>
	</div>

	<div class="lb-form-row">
		<div class="lb-form-label">
			<label for="username"><TMPL_VAR NETSHARES.LABEL_USERNAME></label>
		</div>
		<div class="lb-form-field">
			<input class="lb-input" readonly onfocus="this.removeAttribute('readonly');" value="" id='username' name='username' type='text'>
		</div>
		<div class="lb-form-help hint"><TMPL_VAR NETSHARES.HINT_USERNAME></div>
	</div>

	<div class="lb-form-row">
		<div class="lb-form-label">
			<label for="password"><TMPL_VAR NETSHARES.LABEL_PASSWORD></label>
		</div>
		<div class="lb-form-field">
			<input class="lb-input" readonly onfocus="this.removeAttribute('readonly');" value="" id='password' name='password' type='password' autocomplete="nope">
		</div>
		<div class="lb-form-help hint"><TMPL_VAR NETSHARES.HINT_PASSWORD></div>
	</div>

	<div class="lb-actions">
		<a class="lb-btn lb-btn-sm lb-btn-icon" id="btncancel" href="./netshares.cgi"><i class="pi pi-times"></i> <TMPL_VAR COMMON.BUTTON_CANCEL></a>
		<button class="lb-btn lb-btn-primary lb-btn-sm lb-btn-icon" type="submit" form="main_form" name="btnsubmit" id="btnsubmit"><i class="pi pi-check"></i> <TMPL_VAR COMMON.BUTTON_SAVE></button>
		<button id="showpass" name="showpass" type="button" class="lb-btn lb-btn-sm lb-btn-icon"><i class="pi pi-eye"></i> <TMPL_VAR NETSHARES.BUTTON_SHOW_PASSWORDS></button>
	</div>
</form>

<SCRIPT>
// Show passwords
$(document).ready(function() {
	$('#showpass').click(function() {
		$('.textfield').prop('type', 'text');
	});
	validate_enable('#serverip');
	validate_chk_object(['#serverip']);
});
</SCRIPT>

</TMPL_IF>

			<a class="lb-btn lb-btn-sm lb-btn-icon" id="btnok" href="<TMPL_VAR SELFURL>&q=y"><i class="pi pi-check"></i> <TMPL_VAR COMMON.BUTTON_OK></a>
