<!-- ** START template/system/logfile.html *** -->
<style>
html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; }
#logviewer-wrap {
	display: flex;
	flex-direction: column;
	height: 100vh;
	padding: 12px;
	box-sizing: border-box;
	gap: 8px;
}
#Logfile {
	flex: 1;
	min-height: 0;
	border: 1px solid #c0c0c0;
	padding: 5px 5px 5px 10px;
	background-color: transparent;
	font-family: monospace;
	color: #8080FF;
	overflow-y: scroll;
}
</style>

<div id="logviewer-wrap">

<TMPL_IF NOLOGPARAMETER>
	<div style="background:var(--lb-primary);color:white;padding:8px 16px;border-radius:var(--lb-radius);font-family:var(--lb-font);font-weight:600">
		<i class="pi pi-file"></i> <TMPL_VAR LOGVIEWER.WIDGETLABEL>
	</div>
	<center>
	<div style="width:60%" class="logerror">
		<p><TMPL_VAR LOGVIEWER.ERR_MISSING_LOGPARAMETER_HTML></p>
	</div>
	</center>
</TMPL_IF>

<TMPL_IF NOLOGFILE>
	<div style="background:var(--lb-primary);color:white;padding:8px 16px;border-radius:var(--lb-radius);font-family:var(--lb-font);font-weight:600">
		<i class="pi pi-file"></i> <TMPL_VAR LOGVIEWER.WIDGETLABEL>
	</div>
	<center>
	<div style="width:60%" class="logerror">
		<p><TMPL_VAR LOGVIEWER.ERR_NOLOG_HTML></p>
	</div>
	</center>
<TMPL_ELSE>

	<!-- Green header with log title -->
	<div style="background:var(--lb-primary);color:white;padding:8px 16px;border-radius:var(--lb-radius);font-family:var(--lb-font);font-weight:600;flex-shrink:0">
		<i class="pi pi-file"></i> <TMPL_VAR LOGVIEWER.WIDGETLABEL>:
		<span style="font-family:monospace;font-weight:normal;font-size:0.9em;margin-left:6px">/<TMPL_VAR LOGFILE></span>
	</div>

	<!-- Button bar: Autoscroll left | Download + Close right -->
	<div style="display:flex;align-items:center;flex-shrink:0;gap:8px">
		<label style="display:flex;align-items:center;gap:5px;cursor:pointer;flex:1;margin:0">
			<input type="checkbox" checked id="LogScroll"> <TMPL_VAR LOGVIEWER.BUTTON_AUTOSCROLL>
		</label>
		<a class="lb-btn lb-btn-sm lb-btn-icon" id="btndown"
			href="/admin/system/tools/logfile.cgi?logfile=<TMPL_VAR LOGFILE>&header=file&format=plain"
			target="_blank" download="<TMPL_VAR LOGFILE_NAME>">
			<i class="pi pi-arrow-down"></i> <TMPL_VAR COMMON.BUTTON_DOWNLOAD>
		</a>
		<a class="lb-btn lb-btn-sm lb-btn-icon" id="btnnext" href="javascript:window.close()">
			<i class="pi pi-times"></i> <TMPL_VAR COMMON.BUTTON_CLOSE>
		</a>
	</div>

	<!-- Log content -->
	<div spellcheck="false" id="Logfile">
	<TMPL_LOOP logcontent>
		<TMPL_VAR logcontentline>
	</TMPL_LOOP>
	</div>

</TMPL_IF>
</div>

<script>
$(window).resize(function() { resize_log(); });
function resize_log() { /* height managed by flexbox */ }

$.urlParam = function(name) {
	var results = new RegExp('[\?&]' + name + '=([^&#]*)').exec(window.location.href);
	return results == null ? null : decodeURI(results[1]) || 0;
};

var filesize;
var call_in_progress = 0;

function updatelog() {
	$.ajaxSetup({ cache: false });
	if (call_in_progress == 0) {
		call_in_progress = 1;
		$.get('/admin/system/tools/logfile.cgi?logfile=<TMPL_VAR LOGFILE>&head=none&format=html&clientsize=' + filesize,
			function(data, textStatus, request) {
				filesize = request.getResponseHeader('filesize');
				if (filesize == 0) {
					$('#Logfile').html("<TMPL_VAR LOGVIEWER.ERR_LOGFILE_EMPTY_HTML>");
				} else {
					$('#Logfile').html(data);
				}
				filesize = request.getResponseHeader('filesize');
			})
			.always(function() { call_in_progress = 0; });
	}
	if ($("#LogScroll").is(":checked")) {
		$("#Logfile").scrollTop($("#Logfile")[0].scrollHeight);
	}
}

var interval;

if ($.urlParam('only') === 'once') {
	updatelog();
	$("input[type='checkbox']").attr("checked", false);
} else {
	interval = window.setInterval(updatelog, 300);
}

$("#Logfile").click(function() {
	clearInterval(interval);
	$("input[type='checkbox']").attr("checked", false);
});

$("#LogScroll").click(function() {
	if ($(this).is(':checked')) {
		$("#Logfile").scrollTop($("#Logfile")[0].scrollHeight).delay(100);
		interval = window.setInterval(updatelog, 1000);
	} else {
		clearInterval(interval);
	}
});

$(document).keydown(function(e) {
	switch (e.which) {
		case 13: case 83: case 65: $("#LogScroll").trigger("click"); break;
		case 81: window.close(); break;
		case 36: $("#Logfile").trigger("click").scrollTop(1); break;
		case 35: $("#Logfile").trigger("click").scrollTop(100000000); break;
		case 37: $("#Logfile").scrollLeft($("#Logfile").scrollLeft() - 20); break;
		case 39: $("#Logfile").scrollLeft($("#Logfile").scrollLeft() + 20); break;
		case 33: $("#Logfile").trigger("click").scrollTop($("#Logfile").scrollTop() - 500); break;
		case 38: $("#Logfile").trigger("click").scrollTop($("#Logfile").scrollTop() - 20); break;
		case 34: $("#Logfile").trigger("click").scrollTop($("#Logfile").scrollTop() + 500); break;
		case 32: case 40: $("#Logfile").trigger("click").scrollTop($("#Logfile").scrollTop() + 20); break;
		default: return;
	}
	e.preventDefault();
});
</script>
<!-- ** END template/system/logfile.html *** -->
