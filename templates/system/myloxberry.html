<TMPL_IF form1>
	<form method="post" data-ajax="false" name="main_form" id="main_form" action="<TMPL_VAR SELFURL>">
		<input type="hidden" name="saveformdata" value="1">
		<div class="lb-section-title"><TMPL_VAR MYLOXBERRY.HEADING_LANGUAGESELECTION></div>
		<div class="lb-form-row">
			<div class="lb-form-label">
				<TMPL_VAR MYLOXBERRY.LABEL_SELECTLANGUAGE>
				<TMPL_IF ISNOTENGLISH>
				<br><small>(Select your language)</small>
				</TMPL_IF>
			</div>
			<div class="lb-form-field">
				<TMPL_VAR LANGSELECTOR>
			</div>
		</div>
		<div class="lb-form-row">
			<div class="lb-form-label">
				<TMPL_VAR MYLOXBERRY.LABEL_SELECTCOUNTRY>
			</div>
			<div class="lb-form-field">
				<TMPL_VAR COUNTRYSELECTOR>
			</div>
		</div>

		<div class="lb-section-title"><TMPL_VAR MYLOXBERRY.LABEL_SELECTTHEME></div>
		<div class="lb-form-row">
			<div class="lb-form-label">
				<TMPL_VAR MYLOXBERRY.LABEL_SELECTTHEME>
			</div>
			<div class="lb-form-field">
				<select name="themeselector" id="themeselector" data-mini="true">
					<option value="classic">Classic</option>
					<option value="modern">Modern Flat</option>
					<option value="dark">Dark Mode</option>
				</select>
			</div>
		</div>

		<div class="lb-section-title"><TMPL_VAR MYLOXBERRY.HEADING_FRIENDLYNAME></div>
		<div class="lb-form-row">
			<div class="lb-form-label">
				<TMPL_VAR MYLOXBERRY.LABEL_FRIENDLYNAME>
			</div>
			<div class="lb-form-field">
				<input placeholder="<TMPL_VAR MYLOXBERRY.HINT_INNER_FRIENDLYNAME>" id="lbfriendlyname" name="lbfriendlyname" type="text" class="textfield" value="<TMPL_VAR NETWORK.FRIENDLYNAME>" data-validation-error-msg="<TMPL_VAR MYLOXBERRY.ERR_FRIENDLYNAME>"  data-validation-rule="^([a-zA-Z0-9\#\&\{\}\:\*\[\]\(\)\?\!\_\-\.\|\s\u00C0-\u017F])*$">
			</div>
			<div class="lb-form-help">
				<TMPL_VAR MYLOXBERRY.HINT_FRIENDLYNAME>
			</div>
		</div>

		<div class="lb-section-title"><TMPL_VAR MYLOXBERRY.HEADING_SENDSTATISTIC></div>
		<div class="lb-form-row">
			<div class="lb-form-field">
				<div>
					<TMPL_VAR SENDSTATISTIC_CHECKBOX>
				</div>
			</div>
			<div class="lb-form-help">
				<TMPL_VAR MYLOXBERRY.HINT_SENDSTATISTIC>
			</div>
		</div>
	</form>
	<div class="lb-actions">
		<a id="btncancel" class="lb-btn lb-btn-sm lb-btn-icon" href="/admin/system/index.cgi?form=system"><i class="pi pi-times"></i> <TMPL_VAR COMMON.BUTTON_CANCEL></a>
		<button type="submit" form="main_form" name="btnsubmit" id="btnsubmit" class="lb-btn lb-btn-primary lb-btn-sm lb-btn-icon"><i class="pi pi-check"></i> <TMPL_VAR COMMON.BUTTON_SAVE></button>
	</div>
	<script>
		$(document).ready( function ()
		{
			validate_enable('#lbfriendlyname');
			$("#languageselector").bind( "change", function(event, ui)
			{
				var val = $("#languageselector").val();
				console.log("Lang", val);
				if( val.startsWith('-') || val.startsWith('=') || val == 0 ) return;
				
				$.post("/admin/system/ajax/ajax-config-handler.cgi",
					{
						action: "changelanguage",
						value: val
					}, function()
					{
						location.reload();
					});
			});
			$("#countryselector").bind( "change", function(event, ui)
			{
				var val = $("#countryselector").val();
				console.log("Country", val);
				$.post("/admin/system/ajax/ajax-config-handler.cgi",
					{
						action: "changecountry",
						value: val
					});
			});

			// Theme: Dropdown setzt Wert und wechselt direkt
			var currentTheme = "<TMPL_VAR CURRENTTHEME>" || "classic";
			$("#themeselector").val(currentTheme).selectmenu('refresh');

			$("#themeselector").bind("change", function() {
				var val = $(this).val();
				console.log("Theme", val);
				$.post("/admin/system/ajax/ajax-config-handler.cgi",
					{
						action: "changetheme",
						value: val
					}, function() {
						location.reload();
					});
			});
		});
	</script>
</TMPL_IF>

<TMPL_IF SAVE>
	<center>
		<table border=0>
			<tr>
				<td align="center">
					<h2><TMPL_VAR COMMON.MSG_ALLOK></h2>
					<p>
						<TMPL_VAR MYLOXBERRY.CHANGE_SUCCESS>
						<br/>
						<br/>
					</p>
				</td>
			</tr>
			<tr>
				<td align="center">
					<p>
						<a id="btnok" class="lb-btn lb-btn-primary lb-btn-sm lb-btn-icon" href="<TMPL_VAR NEXTURL>"><i class="pi pi-check"></i> <TMPL_VAR COMMON.BUTTON_OK></a>
					</p>
				</td>
			</tr>
		</table>
	</center>
</TMPL_IF>

<TMPL_IF form2>
<span id="msg_pleasewait"><TMPL_VAR COMMON.MSG_PLEASEWAIT></span>
<script>
function resizeIframe(obj) {
	obj.style.height = obj.contentWindow.document.body.scrollHeight + 'px';
	$("#msg_pleasewait").html("");
}
</script>
<iframe src="/admin/system/tools/linfo/index.php" style="width:100%;height:100%;margin:0;overflow:hidden;border-width:0" scrolling="no" onload="resizeIframe(this)"></iframe>
</TMPL_IF>
<!-- ** END template/system/myloxberry.html ************************************************************************************ -->
