<!-- AppStore — Katalog. Fragment innerhalb der LoxBerry-Seitenstruktur.
     CSS aus mockups/appstore-mockup.html portiert, Farben auf var(--lb-*) gemappt,
     Klassen mit as- praefixiert, keine Akzentstreifen. -->
<style>
.as-toolbar{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin:0 0 18px}
.as-search{flex:1 1 260px;position:relative}
.as-search input{width:100%;padding:10px 14px 10px 38px;border:1px solid var(--lb-border-color);
  border-radius:10px;font-size:14px;background:var(--lb-card-bg,#fff);color:var(--lb-text)}
.as-search .as-ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);opacity:.5}
.as-filter{padding:10px 14px;border:1px solid var(--lb-border-color);border-radius:10px;
  background:var(--lb-card-bg,#fff);color:var(--lb-text);font-size:14px;cursor:pointer}
.as-count{color:var(--lb-text-muted);font-size:13px;margin:0 0 14px}
.as-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
.as-card{background:var(--lb-card-bg,#fff);border:1px solid var(--lb-border-color);
  border-radius:14px;padding:18px;display:flex;flex-direction:column}
.as-card-head{display:flex;gap:13px;align-items:flex-start;margin:0 0 12px}
.as-logo{width:52px;height:52px;border-radius:12px;flex:none;object-fit:contain;
  background:var(--lb-bg);border:1px solid var(--lb-border-color)}
.as-logo-fallback{width:52px;height:52px;border-radius:12px;flex:none;display:flex;
  align-items:center;justify-content:center;font-size:22px;color:#fff;
  background:var(--lb-primary)}
.as-title{font-size:16px;font-weight:600;margin:0;line-height:1.3;color:var(--lb-text)}
.as-author{font-size:12.5px;color:var(--lb-text-muted);margin:2px 0 0}
.as-badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;white-space:nowrap}
.as-badge.ok{background:#e7f5e7;color:#3a9d3a}
.as-badge.beta{background:#e4f0fb;color:#2d86c8}
.as-badge.warn{background:#fbf0dc;color:#d98a14}
.as-badge.stop{background:#fae3e3;color:#b23b3b}
.as-badge.unknown{background:#eee;color:#8a8a8a}
.as-desc{font-size:13.5px;color:var(--lb-text-secondary,#444);line-height:1.5;flex:1;margin:0 0 14px}
.as-meta{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 14px}
.as-tag{font-size:11.5px;color:var(--lb-text-muted);background:var(--lb-bg);
  padding:3px 9px;border-radius:6px}
.as-actions{display:flex;gap:9px;align-items:center;flex-wrap:wrap}
.as-btn-primary{background:var(--lb-primary);color:#fff;border:none;border-radius:10px;
  padding:9px 16px;font-weight:600;cursor:pointer;font-size:13.5px}
.as-btn-primary:hover{filter:brightness(.95)}
.as-btn-ghost{background:var(--lb-bg);color:var(--lb-text);border:1px solid var(--lb-border-color);
  border-radius:10px;padding:9px 16px;font-weight:600;cursor:pointer;font-size:13.5px;text-decoration:none}
.as-installed{font-size:13px;color:var(--lb-primary);font-weight:600}
.as-repo-note{font-size:12px;color:var(--lb-text-muted)}
.as-fallback-note{background:#fff8e6;border:1px solid #f0dca0;color:#8a6d1a;
  padding:9px 12px;border-radius:9px;margin:0 0 16px;font-size:13px}
.as-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);
  z-index:1000;align-items:center;justify-content:center;padding:16px}
.as-modal-overlay.as-open{display:flex}
.as-modal{background:var(--lb-card-bg,#fff);border-radius:14px;padding:22px;
  max-width:440px;width:100%;box-shadow:0 12px 40px rgba(0,0,0,.25)}
.as-modal h3{margin:0 0 6px;font-size:18px;color:var(--lb-text)}
.as-modal-sub{font-size:13px;color:var(--lb-text-muted);margin:0 0 16px}
.as-modal label{display:block;font-size:13px;font-weight:600;margin:0 0 6px;color:var(--lb-text)}
.as-modal input[type=password]{width:100%;padding:10px 13px;border:1px solid var(--lb-border-color);
  border-radius:10px;font-size:14px;margin:0 0 18px;background:var(--lb-card-bg,#fff);color:var(--lb-text)}
.as-modal-actions{display:flex;gap:10px;justify-content:flex-end}
@media (max-width:560px){.as-grid{grid-template-columns:1fr}}
</style>

<TMPL_IF IS_FALLBACK>
<div class="as-fallback-note"><TMPL_VAR APPSTORE.MSG_FALLBACK></div>
</TMPL_IF>

<div class="as-toolbar">
  <div class="as-search">
    <span class="as-ico">&#128269;</span>
    <input type="text" id="as-q" placeholder="<TMPL_VAR APPSTORE.SEARCH_PLACEHOLDER>"
      oninput="asFilter()" autocomplete="off">
  </div>
  <select class="as-filter" id="as-status" onchange="asFilter()">
    <option value=""><TMPL_VAR APPSTORE.FILTER_ALL_STATUS></option>
    <option value="STABLE">STABLE</option>
    <option value="BETA">BETA</option>
    <option value="UNSTABLE">UNSTABLE</option>
    <option value="STOPPED">STOPPED</option>
  </select>
</div>

<div class="as-count"><span id="as-shown"><TMPL_VAR PLUGINCOUNT></span> / <TMPL_VAR PLUGINCOUNT> <TMPL_VAR APPSTORE.OF></div>

<div class="as-grid" id="as-grid">
<TMPL_LOOP NAME=PLUGINS>
  <article class="as-card" data-status="<TMPL_VAR STATUS ESCAPE=HTML>"
    data-text="<TMPL_VAR TITLE ESCAPE=HTML> <TMPL_VAR AUTHOR ESCAPE=HTML> <TMPL_VAR DESCRIPTION ESCAPE=HTML>">
    <div class="as-card-head">
      <TMPL_IF LOGO><img class="as-logo" src="<TMPL_VAR LOGO ESCAPE=HTML>" alt="" loading="lazy"><TMPL_ELSE><div class="as-logo-fallback">&#128230;</div></TMPL_IF>
      <div style="flex:1;min-width:0">
        <h3 class="as-title"><TMPL_VAR TITLE ESCAPE=HTML></h3>
        <p class="as-author"><TMPL_VAR APPSTORE.BY> <TMPL_VAR AUTHOR ESCAPE=HTML></p>
      </div>
      <span class="as-badge <TMPL_VAR BADGE_CLASS>"><TMPL_VAR STATUS ESCAPE=HTML></span>
    </div>
    <p class="as-desc"><TMPL_VAR DESCRIPTION ESCAPE=HTML></p>
    <div class="as-meta">
      <span class="as-tag">v<TMPL_VAR VERSION ESCAPE=HTML></span>
      <TMPL_IF LANGUAGES><span class="as-tag"><TMPL_VAR LANGUAGES ESCAPE=HTML></span></TMPL_IF>
    </div>
    <div class="as-actions">
      <TMPL_IF IS_INSTALLED>
        <span class="as-installed">&#10003; <TMPL_VAR APPSTORE.INSTALLED></span>
      <TMPL_ELSE>
        <TMPL_IF INSTALLABLE>
          <button class="as-btn-primary" onclick="asInstall(this)"
            data-title="<TMPL_VAR TITLE ESCAPE=HTML>" data-zip="<TMPL_VAR ZIP ESCAPE=HTML>"><TMPL_VAR APPSTORE.INSTALL></button>
        <TMPL_ELSE>
          <span class="as-repo-note"><TMPL_VAR APPSTORE.REPO_ONLY></span>
        </TMPL_IF>
      </TMPL_IF>
      <TMPL_IF FORUM><a class="as-btn-ghost" href="<TMPL_VAR FORUM ESCAPE=HTML>" target="_blank" rel="noopener noreferrer"><TMPL_VAR APPSTORE.FORUM></a></TMPL_IF>
    </div>
  </article>
</TMPL_LOOP>
</div>

<!-- Install-Dialog: POSTet versteckt an die bestehende plugininstall.cgi -->
<div class="as-modal-overlay" id="as-modal">
  <div class="as-modal">
    <h3 id="as-modal-title"><TMPL_VAR APPSTORE.INSTALL></h3>
    <p class="as-modal-sub" id="as-modal-name"></p>
    <form method="post" action="/admin/system/plugininstall.cgi">
      <input type="hidden" name="do" value="install">
      <input type="hidden" name="archiveurl" id="as-archiveurl" value="">
      <label for="as-pin"><TMPL_VAR APPSTORE.SECUREPIN></label>
      <input type="password" id="as-pin" name="securepin" autocomplete="off">
      <div class="as-modal-actions">
        <button type="button" class="as-btn-ghost" onclick="asCloseModal()"><TMPL_VAR APPSTORE.CANCEL></button>
        <button type="submit" class="as-btn-primary"><TMPL_VAR APPSTORE.INSTALL_NOW></button>
      </div>
    </form>
  </div>
</div>

<script>
function asFilter(){
  var q=(document.getElementById('as-q').value||'').toLowerCase();
  var st=document.getElementById('as-status').value;
  var n=0,cards=document.querySelectorAll('#as-grid .as-card');
  cards.forEach(function(c){
    var okq=!q||(c.getAttribute('data-text')||'').toLowerCase().indexOf(q)>=0;
    var oks=!st||c.getAttribute('data-status')===st;
    var show=okq&&oks;c.style.display=show?'':'none';if(show)n++;
  });
  document.getElementById('as-shown').textContent=n;
}
function asInstall(btn){
  document.getElementById('as-modal-name').textContent=btn.getAttribute('data-title');
  document.getElementById('as-archiveurl').value=btn.getAttribute('data-zip');
  document.getElementById('as-pin').value='';
  document.getElementById('as-modal').classList.add('as-open');
}
function asCloseModal(){document.getElementById('as-modal').classList.remove('as-open');}
document.addEventListener('keydown',function(e){if(e.key==='Escape')asCloseModal();});
</script>
