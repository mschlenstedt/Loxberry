				<td data-label="<TMPL_VAR STORAGE.AVAILABLE>"><TMPL_VAR USBSTORAGE_AVAILABLE></td>

				<td data-label="<TMPL_VAR USBSTORAGE.STORAGESTABLE_ACTION>"><a class="lb-btn lb-btn-sm lb-btn-icon" id="browse<TMPL_VAR USBSTORAGE_NO>" href="/admin/system/tools/filemanager/filemanager.php?p=system/storage/usb/<TMPL_VAR USBSTORAGE_DEVICE>" target="_self"><i class="pi pi-search"></i> <TMPL_VAR USBSTORAGE.BUTTON_BROWSE></a>

			</tr>

		<TMPL_ELSE>
			<tr>
				<td colspan="9"><TMPL_VAR USBSTORAGE.HINT_NOSTORAGE></td>

	</tr>
	<tr>

	</tr>
	</table>
