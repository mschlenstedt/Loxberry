<TMPL_IF FORM_LOG>
	<TMPL_UNLESS SINGLE_PACKAGE>
		<p><TMPL_VAR LOGMANAGER.LOG_INTRO></p>
	</TMPL_UNLESS>
</TMPL_IF>

<TMPL_IF FORM_LEGACYLOG>
	<TMPL_LOOP PLUGINS>
		<details class="lb-collapsible" id='coll_package_<TMPL_VAR PLUGINDB_FOLDER>'>
			<summary class="lb-section-title" id='package_<TMPL_VAR PLUGINDB_FOLDER>'><TMPL_VAR PLUGINDB_TITLE> <span style='font-size:80%;'>
				<TMPL_IF ISSYSTEM>
				<TMPL_ELSE>(Plugin Log)
				</TMPL_IF>
				</span></summary>

			<table class="lb-table" style='width:100%;'>
				<TMPL_LOOP FILES>
				<tr>
					<td><TMPL_VAR fileshortname></td>
					<td><TMPL_VAR filemtime></td>
					<td><a class="lb-btn lb-btn-sm lb-btn-icon" href='/admin/system/tools/logfile.cgi?logfile=<TMPL_VAR filename_esc>&header=html&format=template&only=once' target='_blank'><i class="pi pi-external-link"></i> Logfile</a></td>
					<td><TMPL_VAR filesize></td>
				</tr>
				</TMPL_LOOP>
			</table>
		</details>
	</TMPL_LOOP>
	<p><TMPL_VAR LOGMANAGER.LEGACY_INTRO></p>
</TMPL_IF>

<script>

$( document ).ready(function() {
    restoreWindow();
	$(".lb-collapsible").on("toggle", function() {
		var state = this.open ? "expand" : "collapse";
		console.log(state, $(this).attr('id'));
		storeWindow($(this).attr('id'), state);
	});
});

function storeWindow (name, pos)
{
	sessionStorage.setItem("coll_"+name, pos);
}

function restoreWindow()
{
	$(".lb-collapsible").each(function () {
		var pos = sessionStorage.getItem("coll_"+$(this).attr('id'));
		if (pos === "expand") {
			this.open = true;
		} else if (pos === "collapse") {
			this.open = false;
		} else {
			sessionStorage.removeItem("coll_"+$(this).attr('id'));
		}
		console.log($(this).attr('id'), pos);
	});
}

</script>
